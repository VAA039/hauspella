<!DOCTYPE html>
<html>
<head>
    <title>Магазин</title>
</head>
<body>

<h1>Список товаров</h1>

<!-- {% for product in products %} → цикл по товарам -->
{% for product in products %} 
    <div>
      <!-- {{ product.name }} → вывод поля -->
        <h2>{{ product.name }}</h2> 
        <p>{{ product.description }}</p>
        <p>Цена: {{ product.price }}</p>
    </div>
    <hr>
{% endfor %} 

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Магазин</title>
</head>
<body>

<h1>Список товаров</h1>


{% for product in products %} 
    <div>

        <h2>{{ product.name }}</h2> 
        <p>{{ product.description|linebreaks }}</p>
        <p>Цена: {{ product.price }}</p>
    </div>
    <hr>
{% endfor %} 

</body>
</html>
